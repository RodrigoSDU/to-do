<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #24243200;
      --border: #2e2e40;
      --accent: #7c6af7;
      --accent-dim: #7c6af722;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --check-done: #4ade80;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 52px 24px 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--accent);
    }

    .stats {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── List ── */
    #list {
      flex: 1;
      padding: 8px 16px 120px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    /* ── Todo card ── */
    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: opacity 0.2s, transform 0.15s;
      animation: slideIn 0.18s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done {
      opacity: 0.45;
    }

    /* Custom checkbox */
    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .check-btn:active { transform: scale(0.88); }

    .todo-item.done .check-btn {
      border-color: var(--check-done);
      background: var(--check-done);
    }

    .check-btn svg { display: none; }
    .todo-item.done .check-btn svg { display: block; }

    /* Text */
    .todo-text {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.5;
      word-break: break-word;
      padding-top: 2px;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Delete */
    .del-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .todo-item:hover .del-btn,
    .todo-item:focus-within .del-btn {
      opacity: 1;
    }

    /* always show on touch devices */
    @media (hover: none) {
      .del-btn { opacity: 0.4; }
    }

    .del-btn:active { color: #f87171; opacity: 1; }

    /* ── Input bar ── */
    .input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #todo-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 1rem;
      padding: 13px 18px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    #todo-input::placeholder { color: var(--text-muted); }

    #todo-input:focus {
      border-color: var(--accent);
    }

    #add-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #add-btn:active { transform: scale(0.9); }
    #add-btn:disabled { background: var(--border); cursor: default; }
  </style>
</head>
<body>

  <header>
    <h1>My <span>Todo</span></h1>
    <p class="stats" id="stats"></p>
  </header>

  <main id="list"></main>

  <div class="input-bar">
    <input id="todo-input" type="text" placeholder="Add a task…" maxlength="280" autocomplete="off" />
    <button id="add-btn" aria-label="Add task" disabled>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script>
    const STORAGE_KEY = 'todos_v1';

    // ── Data helpers ──────────────────────────────────────────
    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function createTodo(text) {
      return {
        id: crypto.randomUUID(),
        text: text.trim(),
        done: false,
        createdAt: Date.now(),
        // future fields go here: priority, dueDate, tags, notes…
      };
    }

    // ── Render ────────────────────────────────────────────────
    const list   = document.getElementById('list');
    const stats  = document.getElementById('stats');
    const input  = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');

    function render() {
      const todos = load();
      const done  = todos.filter(t => t.done).length;

      stats.textContent = todos.length
        ? `${done} of ${todos.length} complete`
        : 'Nothing here yet';

      if (!todos.length) {
        list.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="12" width="32" height="4" rx="2" fill="currentColor"/>
              <rect x="8" y="22" width="24" height="4" rx="2" fill="currentColor"/>
              <rect x="8" y="32" width="28" height="4" rx="2" fill="currentColor"/>
            </svg>
            <span>Add your first task below</span>
          </div>`;
        return;
      }

      list.innerHTML = '';
      todos.forEach(todo => {
        const el = document.createElement('div');
        el.className = 'todo-item' + (todo.done ? ' done' : '');
        el.dataset.id = todo.id;
        el.innerHTML = `
          <button class="check-btn" aria-label="Toggle done">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#0f0f13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="todo-text">${escHtml(todo.text)}</span>
          <button class="del-btn" aria-label="Delete task">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>`;

        el.querySelector('.check-btn').addEventListener('click', () => toggle(todo.id));
        el.querySelector('.del-btn').addEventListener('click', () => remove(todo.id));
        list.appendChild(el);
      });
    }

    function escHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ── Actions ───────────────────────────────────────────────
    function add(text) {
      const todos = load();
      todos.unshift(createTodo(text));
      save(todos);
      render();
    }

    function toggle(id) {
      const todos = load();
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(todos); render(); }
    }

    function remove(id) {
      save(load().filter(t => t.id !== id));
      render();
    }

    // ── Input events ──────────────────────────────────────────
    input.addEventListener('input', () => {
      addBtn.disabled = !input.value.trim();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) submit();
    });

    addBtn.addEventListener('click', submit);

    function submit() {
      const text = input.value.trim();
      if (!text) return;
      add(text);
      input.value = '';
      addBtn.disabled = true;
    }

    // ── Boot ──────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
