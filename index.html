<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface-hi: #22222e;
      --border: #2e2e40;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.15);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --r: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 52px 20px 12px;
      position: sticky; top: 0;
      background: var(--bg); z-index: 10;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    .stats { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    /* View toggle button */
    .view-toggle {
      background: transparent; border: none; color: var(--muted);
      padding: 7px; border-radius: 10px; cursor: pointer; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .view-toggle:hover { color: var(--text); }
    body.cal-mode .view-toggle { color: var(--accent); background: var(--accent-dim); }

    /* Filter bar */
    .filter-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 0 2px; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar:empty { display: none; }
    .filter-tag {
      font-size: 0.8rem; padding: 4px 12px; border-radius: 100px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-tag.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    /* ── View switching ── */
    body.cal-mode #list       { display: none; }
    body.cal-mode .filter-bar { display: none; }
    body.cal-mode .input-bar  { display: none; }
    #cal-view { display: none; padding: 0 16px 60px; flex-direction: column; }
    body.cal-mode #cal-view   { display: flex; }

    /* ── List ── */
    #list { flex: 1; padding: 8px 16px 120px; display: flex; flex-direction: column; gap: 8px; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 80px 0;
      color: var(--muted); font-size: 0.9rem; opacity: 0.5;
    }

    /* ── Todo item ── */
    .todo-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 12px 12px 8px;
      display: flex; align-items: flex-start; gap: 8px;
      transition: border-color 0.2s;
    }
    .todo-item.closed { opacity: 0.45; }
    .todo-item.drag-source { opacity: 0; pointer-events: none; }
    .todo-item.overdue:not(.closed) { border-color: rgba(248,113,113,0.35); }

    .drag-handle {
      color: var(--muted); padding: 3px 4px; cursor: grab;
      flex-shrink: 0; margin-top: 2px;
      touch-action: none; -webkit-user-select: none; user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .check-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-btn svg { display: none; }
    .todo-item.closed .check-btn { border-color: var(--green); background: var(--green); }
    .todo-item.closed .check-btn svg { display: block; }

    .item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .item-main { display: flex; align-items: flex-start; gap: 6px; min-height: 24px; }
    .todo-text {
      flex: 1; font-size: 0.97rem; line-height: 1.45;
      word-break: break-word; cursor: pointer; padding-top: 2px;
    }
    .todo-item.closed .todo-text { text-decoration: line-through; color: var(--muted); }

    .prog-ring-wrap { flex-shrink: 0; margin-top: 1px; }
    .ring-fill { transition: stroke-dasharray 0.4s cubic-bezier(0.4,0,0.2,1), stroke 0.3s; }
    .ring-pct { -webkit-user-select: none; user-select: none; }

    .collapse-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 2px; flex-shrink: 0;
      display: flex; align-items: center;
      -webkit-tap-highlight-color: transparent; margin-top: 3px;
    }
    .collapse-btn svg { transition: transform 0.2s; transform: rotate(180deg); }
    .todo-item.collapsed .collapse-btn svg { transform: rotate(0deg); }

    /* Due date chips */
    .item-due { padding-top: 5px; }
    .due-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.72rem; font-weight: 500;
      padding: 2px 7px; border-radius: 100px; white-space: nowrap;
    }
    .due-upcoming { color: var(--muted); background: var(--surface-hi); }
    .due-today    { color: var(--orange); background: rgba(251,146,60,0.12); }
    .due-overdue  { color: var(--red);    background: rgba(248,113,113,0.12); }
    .due-sm { font-size: 0.68rem; padding: 1px 5px; }

    .item-details { padding-top: 6px; display: flex; flex-direction: column; gap: 6px; }
    .todo-item.collapsed .item-details { display: none; }

    .item-summary { font-size: 0.82rem; color: var(--muted); line-height: 1.4; word-break: break-word; white-space: pre-wrap; }
    .item-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 100px; background: var(--accent-dim); color: var(--accent); font-weight: 500; }

    .subtask-list { display: flex; flex-direction: column; gap: 2px; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px; }
    .subtask-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-radius: 6px; }
    .subtask-row.drag-source { opacity: 0; pointer-events: none; }
    .st-drag { color: var(--muted); padding: 2px 3px; cursor: grab; flex-shrink: 0; touch-action: none; -webkit-user-select: none; user-select: none; opacity: 0.5; }
    .st-drag:active { cursor: grabbing; }
    .subtask-chk {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .subtask-chk svg { display: none; }
    .subtask-row.done .subtask-chk { border-color: var(--green); background: var(--green); }
    .subtask-row.done .subtask-chk svg { display: block; }
    .subtask-text { flex: 1; font-size: 0.88rem; color: var(--text); line-height: 1.35; }
    .subtask-row.done .subtask-text { text-decoration: line-through; color: var(--muted); }

    .del-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 2px 4px; opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    @media (hover: none) { .del-btn { opacity: 0.4; } }
    .del-btn:active { color: var(--red); opacity: 1; }

    /* ── Input bar ── */
    .input-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      display: flex; gap: 10px; align-items: center;
    }
    #todo-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; color: var(--text); font-size: 1rem;
      padding: 12px 18px; outline: none; -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    #todo-input::placeholder { color: var(--muted); }
    #todo-input:focus { border-color: var(--accent); }
    #add-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    #add-btn:active { transform: scale(0.9); }
    #add-btn:disabled { background: var(--border); cursor: default; }

    /* ── Calendar ── */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 0 16px; }
    .cal-nav-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); width: 36px; height: 36px; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cal-month-lbl { font-size: 1rem; font-weight: 600; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow {
      text-align: center; font-size: 0.68rem; color: var(--muted);
      font-weight: 600; padding: 0 0 8px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .cal-cell {
      aspect-ratio: 1; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; padding: 3px 2px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-cell.cal-empty { background: transparent; border-color: transparent; pointer-events: none; }
    .cal-cell.cal-today { border-color: var(--accent); }
    .cal-cell.cal-today .cal-dn { color: var(--accent); font-weight: 700; }
    .cal-cell.cal-selected { background: var(--accent); border-color: var(--accent); }
    .cal-cell.cal-selected .cal-dn { color: #fff; font-weight: 700; }
    .cal-cell.cal-selected .cal-cnt { background: rgba(255,255,255,0.25); color: #fff; }
    .cal-cell:not(.cal-empty):not(.cal-selected):hover { border-color: var(--muted); }
    .cal-dn { font-size: 0.82rem; font-weight: 500; color: var(--text); line-height: 1; }
    .cal-cnt {
      font-size: 0.6rem; font-weight: 700;
      background: var(--accent-dim); color: var(--accent);
      padding: 1px 5px; border-radius: 100px; line-height: 1.4;
      min-width: 16px; text-align: center;
    }

    /* Day detail */
    .cal-detail { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 16px; }
    .cal-detail-hdr {
      font-size: 0.78rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
    }
    .cal-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-item:hover { border-color: var(--accent); }
    .cal-item.is-closed, .cal-item.is-done { opacity: 0.5; }
    .cal-item-kind {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 3px;
    }
    .cal-item-kind.task-lbl { color: var(--accent); }
    .cal-item-kind.sub-lbl  { color: var(--muted); }
    .cal-item-parent { font-size: 0.78rem; color: var(--muted); margin-bottom: 2px; }
    .cal-item-title { font-size: 0.95rem; font-weight: 500; line-height: 1.35; }
    .cal-item.is-closed .cal-item-title { text-decoration: line-through; color: var(--muted); }
    .cal-item-sub  { font-size: 0.88rem; line-height: 1.35; }
    .cal-item.is-done .cal-item-sub { text-decoration: line-through; color: var(--muted); }

    /* ── Backdrop ── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .backdrop.open { opacity: 1; pointer-events: all; }

    /* ── Edit sheet ── */
    .sheet {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 480px;
      background: var(--surface); border-radius: 20px 20px 0 0;
      z-index: 51;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 88dvh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }
    .sheet-grip { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .sheet-inner { padding: 16px 20px 24px; }
    .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .sheet-header h2 { font-size: 1.1rem; font-weight: 600; }
    .sheet-close-btn {
      background: var(--surface-hi); border: none; color: var(--muted);
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .field-group { margin-bottom: 18px; }
    .field-label {
      font-size: 0.75rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .optional { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.75rem; opacity: 0.65; }

    .sheet input[type="text"],
    .sheet input[type="date"],
    .sheet textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 0.97rem;
      padding: 11px 14px; outline: none; font-family: inherit;
      -webkit-appearance: none; transition: border-color 0.15s;
    }
    .sheet textarea { resize: vertical; }
    .sheet input[type="date"] { color-scheme: dark; }
    .sheet input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; filter: invert(0.6); }
    .sheet input:focus, .sheet textarea:focus { border-color: var(--accent); }
    .sheet input::placeholder, .sheet textarea::placeholder { color: var(--muted); }

    .seg-ctrl { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; }
    .seg-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--muted); border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; }
    .seg-btn.active { background: var(--accent); color: #fff; font-weight: 500; }

    .tags-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; transition: border-color 0.15s; }
    .tags-wrap:focus-within { border-color: var(--accent); }
    #tag-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    #tag-chips:empty { display: none; }
    .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-dim); color: var(--accent); font-size: 0.78rem; padding: 3px 8px; border-radius: 100px; font-weight: 500; }
    .tag-remove { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; opacity: 0.7; }
    .tag-remove:hover { opacity: 1; }
    #tag-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit; }
    #tag-input::placeholder { color: var(--muted); }

    #sheet-subtasks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .sheet-sub-row { display: flex; align-items: flex-start; gap: 8px; background: var(--bg); border-radius: 8px; padding: 8px 10px; }
    .sheet-sub-chk {
      width: 20px; height: 20px; border-radius: 50%; margin-top: 1px;
      border: 1.5px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-sub-chk svg { display: none; }
    .sheet-sub-row.done .sheet-sub-chk { border-color: var(--green); background: var(--green); }
    .sheet-sub-row.done .sheet-sub-chk svg { display: block; }
    .sheet-sub-body { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .sheet-sub-text { font-size: 0.9rem; line-height: 1.4; }
    .sheet-sub-row.done .sheet-sub-text { text-decoration: line-through; color: var(--muted); }
    .sheet-sub-date {
      font-size: 0.78rem; padding: 4px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-family: inherit;
      outline: none; color-scheme: dark; width: auto; max-width: 160px;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    .sheet-sub-date:focus { border-color: var(--accent); color: var(--text); }
    .sheet-sub-date::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; filter: invert(0.6); }
    .sheet-sub-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 2px; line-height: 1; margin-top: 1px; flex-shrink: 0; }
    .sheet-sub-del:hover { color: var(--red); }

    .sheet-sub-add { display: flex; gap: 8px; align-items: center; }
    .sheet-sub-add input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; padding: 9px 12px; outline: none; font-family: inherit; -webkit-appearance: none; transition: border-color 0.15s; }
    .sheet-sub-add input:focus { border-color: var(--accent); }
    .sheet-sub-add input::placeholder { color: var(--muted); }
    .sheet-sub-add-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-dim); border: none; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
    .sheet-sub-add-btn:hover { background: var(--accent); color: #fff; }

    .sheet-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-delete { flex: 1; padding: 13px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--red); font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-delete:active { background: rgba(248,113,113,0.1); }
    .btn-save { flex: 2; padding: 13px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-save:active { opacity: 0.85; }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>My <span>Todo</span></h1>
      <button id="view-toggle" class="view-toggle" aria-label="Switch to calendar view">
        <svg id="toggle-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="4" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M2 9h18" stroke="currentColor" stroke-width="1.6"/>
          <path d="M7 2v4M15 2v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="7" cy="14" r="1.2" fill="currentColor"/>
          <circle cx="11" cy="14" r="1.2" fill="currentColor"/>
          <circle cx="15" cy="14" r="1.2" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <p class="stats" id="stats"></p>
    <div id="filter-bar" class="filter-bar"></div>
  </header>

  <main id="list"></main>

  <!-- Calendar view -->
  <div id="cal-view">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev" aria-label="Previous month">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="cal-month-lbl" id="cal-month-lbl"></span>
      <button class="cal-nav-btn" id="cal-next" aria-label="Next month">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <div id="cal-detail"></div>
  </div>

  <div class="input-bar">
    <input id="todo-input" type="text" placeholder="Add a task…" maxlength="280" autocomplete="off" />
    <button id="add-btn" aria-label="Add task" disabled>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div id="backdrop" class="backdrop"></div>
  <div id="sheet" class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-grip"></div>
    <div class="sheet-inner">
      <div class="sheet-header">
        <h2>Edit task</h2>
        <button id="sheet-close" class="sheet-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="field-group">
        <div class="field-label">Title</div>
        <input id="edit-title" type="text" maxlength="280" />
      </div>
      <div class="field-group">
        <div class="field-label">Status</div>
        <div class="seg-ctrl" id="status-ctrl">
          <button class="seg-btn active" data-val="open">Open</button>
          <button class="seg-btn" data-val="closed">Closed</button>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Due Date <span class="optional">optional</span></div>
        <input id="edit-due" type="date" />
      </div>
      <div class="field-group">
        <div class="field-label">Summary <span class="optional">optional</span></div>
        <textarea id="edit-summary" rows="3" placeholder="Add more context…"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">Tags <span class="optional">optional · one word each</span></div>
        <div class="tags-wrap">
          <div id="tag-chips"></div>
          <input id="tag-input" type="text" placeholder="Type a word, press Enter or Space"
            maxlength="30" autocomplete="off" autocorrect="off" autocapitalize="off" />
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Subtasks <span class="optional">optional</span></div>
        <div id="sheet-subtasks"></div>
        <div class="sheet-sub-add">
          <input id="sub-input" type="text" placeholder="Add a subtask…" maxlength="200" autocomplete="off" />
          <button id="sub-add-btn" class="sheet-sub-add-btn" aria-label="Add subtask">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="sheet-actions">
        <button id="sheet-delete" class="btn-delete">Delete</button>
        <button id="sheet-save" class="btn-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    const KEY = 'todos_v1';

    // ── State ─────────────────────────────────────────────────
    let editId        = null;
    let drag          = null;
    let subtaskDrag   = null;
    let activeTags    = new Set();
    let sheetTags     = [];
    let sheetStatus   = 'open';
    let sheetSubtasks = [];

    // Calendar state
    let calView = false;
    const _now  = new Date();
    let calYear  = _now.getFullYear();
    let calMonth = _now.getMonth();
    let calSelDate = null;

    // ── Storage ───────────────────────────────────────────────
    function load() {
      try {
        const raw = JSON.parse(localStorage.getItem(KEY)) || [];
        return raw.map(t => {
          if (t.status === undefined) t.status = t.done ? 'closed' : 'open';
          if (!t.tags)      t.tags      = [];
          if (!t.subtasks)  t.subtasks  = [];
          if (t.summary  == null) t.summary  = '';
          if (t.collapsed == null) t.collapsed = false;
          if (t.dueDate  == null) t.dueDate  = null;
          t.subtasks = t.subtasks.map(s => ({ dueDate: null, ...s }));
          delete t.done;
          return t;
        });
      } catch { return []; }
    }

    function save(todos) { localStorage.setItem(KEY, JSON.stringify(todos)); }

    function createTodo(text) {
      return { id: crypto.randomUUID(), text: text.trim(), status: 'open',
               summary: '', tags: [], subtasks: [], collapsed: false,
               dueDate: null, createdAt: Date.now() };
    }

    function createSubtask(text) {
      return { id: crypto.randomUUID(), text: text.trim(), done: false, dueDate: null };
    }

    // ── Helpers ───────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function todayStr() {
      const t = new Date();
      return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    }

    function dueState(dateStr) {
      if (!dateStr) return null;
      const [y, m, d] = dateStr.split('-').map(Number);
      const due   = new Date(y, m - 1, d);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const label = due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (due < today) return { label, cls: 'overdue' };
      if (due.getTime() === today.getTime()) return { label: 'Today', cls: 'today' };
      return { label, cls: 'upcoming' };
    }

    const WARN_SVG = `<svg width="9" height="9" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M5 1.2L9.2 8.8H0.8L5 1.2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M5 4.2V6.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="5" cy="7.6" r="0.55" fill="currentColor"/></svg>`;

    function dueBadge(dateStr, sm = false) {
      const info = dueState(dateStr);
      if (!info) return '';
      const icon = info.cls === 'overdue' ? WARN_SVG : '';
      return `<span class="due-chip due-${info.cls}${sm ? ' due-sm' : ''}">${icon}${esc(info.label)}</span>`;
    }

    function buildRingHtml(done, total) {
      if (total === 0) return '';
      const pct = Math.round(done / total * 100);
      const r = 11; const circ = +(2 * Math.PI * r).toFixed(2);
      const filled = +(circ * done / total).toFixed(2);
      const color = done === total ? 'var(--green)' : 'var(--accent)';
      const tFill = done === total ? 'var(--green)' : 'var(--muted)';
      return `<div class="prog-ring-wrap"><svg width="28" height="28" viewBox="0 0 28 28" style="display:block">
        <circle cx="14" cy="14" r="${r}" fill="none" stroke="var(--border)" stroke-width="2.5"/>
        <circle class="ring-fill" cx="14" cy="14" r="${r}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="${filled} ${circ}" transform="rotate(-90 14 14)"/>
        <text class="ring-pct" x="14" y="14.5" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="700" fill="${tFill}" font-family="-apple-system,sans-serif">${pct}</text>
      </svg></div>`;
    }

    function updateRing(wrapEl, done, total) {
      if (!wrapEl) return;
      const pct = total === 0 ? 0 : Math.round(done / total * 100);
      const r = 11; const circ = +(2 * Math.PI * r).toFixed(2);
      const filled = +(circ * done / total).toFixed(2);
      const color = done === total ? 'var(--green)' : 'var(--accent)';
      const tFill = done === total ? 'var(--green)' : 'var(--muted)';
      const f = wrapEl.querySelector('.ring-fill'); const t = wrapEl.querySelector('.ring-pct');
      if (f) { f.style.strokeDasharray = `${filled} ${circ}`; f.style.stroke = color; }
      if (t) { t.textContent = pct; t.setAttribute('fill', tFill); }
    }

    // ── DOM refs ──────────────────────────────────────────────
    const listEl      = document.getElementById('list');
    const statsEl     = document.getElementById('stats');
    const filterBarEl = document.getElementById('filter-bar');
    const inputEl     = document.getElementById('todo-input');
    const addBtnEl    = document.getElementById('add-btn');
    const backdropEl  = document.getElementById('backdrop');
    const sheetEl     = document.getElementById('sheet');
    const editTitleEl = document.getElementById('edit-title');
    const editDueEl   = document.getElementById('edit-due');
    const editSumEl   = document.getElementById('edit-summary');
    const tagChipsEl  = document.getElementById('tag-chips');
    const tagInputEl  = document.getElementById('tag-input');
    const statusCtrl  = document.getElementById('status-ctrl');
    const sheetSubsEl = document.getElementById('sheet-subtasks');
    const subInputEl  = document.getElementById('sub-input');
    const calGridEl   = document.getElementById('cal-grid');
    const calMonthLbl = document.getElementById('cal-month-lbl');
    const calDetailEl = document.getElementById('cal-detail');
    const viewToggle  = document.getElementById('view-toggle');

    // ── Render (dispatches to list or calendar) ───────────────
    function render() {
      const all    = load();
      const closed = all.filter(t => t.status === 'closed').length;
      statsEl.textContent = all.length ? `${closed} of ${all.length} closed` : 'Nothing here yet';

      document.body.classList.toggle('cal-mode', calView);

      if (calView) {
        renderCalendar(all);
        if (calSelDate) renderCalDetail(calSelDate, all);
        return;
      }

      renderFilterBar(all);

      const shown = activeTags.size > 0
        ? all.filter(t => t.tags.some(tag => activeTags.has(tag)))
        : all;

      if (!shown.length) {
        listEl.innerHTML = `<div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="6" y="10" width="28" height="3" rx="1.5" fill="currentColor"/>
            <rect x="6" y="19" width="20" height="3" rx="1.5" fill="currentColor"/>
            <rect x="6" y="28" width="24" height="3" rx="1.5" fill="currentColor"/>
          </svg>
          <span>${activeTags.size ? 'No tasks match the selected tags' : 'Add your first task below'}</span>
        </div>`;
        return;
      }
      listEl.innerHTML = '';
      shown.forEach(t => listEl.appendChild(makeItem(t)));
    }

    function renderFilterBar(todos) {
      const tags = [...new Set(todos.flatMap(t => t.tags))].sort();
      filterBarEl.innerHTML = tags.map(tag =>
        `<button class="filter-tag${activeTags.has(tag) ? ' active' : ''}" data-tag="${esc(tag)}">${esc(tag)}</button>`
      ).join('');
      filterBarEl.querySelectorAll('.filter-tag').forEach(btn =>
        btn.addEventListener('click', () => {
          const tag = btn.dataset.tag;
          activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
          render();
        })
      );
    }

    // ── Calendar ──────────────────────────────────────────────
    function buildCountMap(todos) {
      const map = {};
      todos.forEach(t => {
        if (t.dueDate) map[t.dueDate] = (map[t.dueDate] || 0) + 1;
        t.subtasks.forEach(s => {
          if (s.dueDate) map[s.dueDate] = (map[s.dueDate] || 0) + 1;
        });
      });
      return map;
    }

    function renderCalendar(todos) {
      const all    = todos || load();
      const tStr   = todayStr();
      const counts = buildCountMap(all);
      const first  = new Date(calYear, calMonth, 1);
      const last   = new Date(calYear, calMonth + 1, 0).getDate();
      const startDow = first.getDay();

      calMonthLbl.textContent = first.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
      let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

      for (let i = 0; i < startDow; i++) html += `<div class="cal-cell cal-empty"></div>`;

      for (let d = 1; d <= last; d++) {
        const ds  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cnt = counts[ds] || 0;
        const cls = ['cal-cell',
          ds === tStr      ? 'cal-today'    : '',
          ds === calSelDate ? 'cal-selected' : '',
        ].filter(Boolean).join(' ');
        html += `<div class="${cls}" data-date="${ds}">
          <span class="cal-dn">${d}</span>
          ${cnt ? `<span class="cal-cnt">${cnt}</span>` : ''}
        </div>`;
      }

      calGridEl.innerHTML = html;

      calGridEl.querySelectorAll('.cal-cell:not(.cal-empty)').forEach(cell =>
        cell.addEventListener('click', () => {
          calSelDate = cell.dataset.date;
          renderCalendar();
          renderCalDetail(calSelDate);
        })
      );
    }

    function renderCalDetail(dateStr, todos) {
      if (!dateStr) { calDetailEl.innerHTML = ''; return; }
      const all   = todos || load();
      const items = [];

      all.forEach(todo => {
        if (todo.dueDate === dateStr) items.push({ kind: 'task', todo });
        todo.subtasks.forEach(sub => {
          if (sub.dueDate === dateStr) items.push({ kind: 'subtask', sub, parent: todo });
        });
      });

      const [y, m, d] = dateStr.split('-').map(Number);
      const label = new Date(y, m-1, d).toLocaleDateString('en-US',
        { weekday: 'long', month: 'long', day: 'numeric' });

      if (!items.length) {
        calDetailEl.innerHTML = `<div class="cal-detail">
          <div class="cal-detail-hdr">${esc(label)}</div>
          <p style="font-size:0.88rem;color:var(--muted)">No tasks scheduled for this day.</p>
        </div>`;
        return;
      }

      calDetailEl.innerHTML = `<div class="cal-detail">
        <div class="cal-detail-hdr">${esc(label)}</div>
        ${items.map(item => {
          if (item.kind === 'task') {
            return `<div class="cal-item${item.todo.status === 'closed' ? ' is-closed' : ''}" data-id="${item.todo.id}">
              <div class="cal-item-kind task-lbl">Task</div>
              <div class="cal-item-title">${esc(item.todo.text)}</div>
            </div>`;
          } else {
            return `<div class="cal-item${item.sub.done ? ' is-done' : ''}" data-todo-id="${item.parent.id}">
              <div class="cal-item-kind sub-lbl">Subtask of</div>
              <div class="cal-item-parent">${esc(item.parent.text)}</div>
              <div class="cal-item-sub">${esc(item.sub.text)}</div>
            </div>`;
          }
        }).join('')}
      </div>`;

      calDetailEl.querySelectorAll('.cal-item').forEach(el =>
        el.addEventListener('click', () => openEdit(el.dataset.id || el.dataset.todoId))
      );
    }

    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
      calSelDate = null; calDetailEl.innerHTML = '';
      renderCalendar();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
      calSelDate = null; calDetailEl.innerHTML = '';
      renderCalendar();
    });

    const CAL_ICON = `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="4" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
      <path d="M2 9h18" stroke="currentColor" stroke-width="1.6"/>
      <path d="M7 2v4M15 2v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="7" cy="14" r="1.2" fill="currentColor"/>
      <circle cx="11" cy="14" r="1.2" fill="currentColor"/>
      <circle cx="15" cy="14" r="1.2" fill="currentColor"/>
    </svg>`;

    const LIST_ICON = `<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M4 6h14M4 11h14M4 16h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>`;

    viewToggle.addEventListener('click', () => {
      calView = !calView;
      viewToggle.innerHTML = calView ? LIST_ICON : CAL_ICON;
      viewToggle.setAttribute('aria-label', calView ? 'Switch to list view' : 'Switch to calendar view');
      render();
    });

    // ── List item builder ─────────────────────────────────────
    function makeItem(todo) {
      const hasDetails = !!todo.summary || todo.tags.length > 0 || todo.subtasks.length > 0;
      const isCollapsed = hasDetails && todo.collapsed;
      const doneCount   = todo.subtasks.filter(s => s.done).length;
      const totalCount  = todo.subtasks.length;
      const taskDue     = dueState(todo.dueDate);
      const isOverdue   = taskDue?.cls === 'overdue' && todo.status !== 'closed';

      const el = document.createElement('div');
      el.className = ['todo-item',
        todo.status === 'closed' ? 'closed'    : '',
        isCollapsed               ? 'collapsed' : '',
        isOverdue                 ? 'overdue'   : '',
      ].filter(Boolean).join(' ');
      el.dataset.id = todo.id;

      const ringHtml = buildRingHtml(doneCount, totalCount);
      const collapseHtml = hasDetails
        ? `<button class="collapse-btn" aria-expanded="${!isCollapsed}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 4.5l4 4 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>` : '';

      const taskDueBadge = dueBadge(todo.dueDate);
      const sumHtml  = todo.summary ? `<p class="item-summary">${esc(todo.summary)}</p>` : '';
      const tagsHtml = todo.tags.length
        ? `<div class="item-tags">${todo.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : '';
      const subtasksHtml = todo.subtasks.length
        ? `<div class="subtask-list">${todo.subtasks.map(s => {
            return `<div class="subtask-row${s.done ? ' done' : ''}" data-subtask-id="${s.id}">
              <div class="st-drag" aria-label="Hold to reorder subtask">
                <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                  <circle cx="2" cy="2"  r="1" fill="currentColor"/>
                  <circle cx="6" cy="2"  r="1" fill="currentColor"/>
                  <circle cx="2" cy="6"  r="1" fill="currentColor"/>
                  <circle cx="6" cy="6"  r="1" fill="currentColor"/>
                  <circle cx="2" cy="10" r="1" fill="currentColor"/>
                  <circle cx="6" cy="10" r="1" fill="currentColor"/>
                </svg>
              </div>
              <button class="subtask-chk" aria-label="Toggle subtask">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                  <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <span class="subtask-text">${esc(s.text)}</span>
              ${dueBadge(s.dueDate, true)}
            </div>`;
          }).join('')}</div>` : '';

      el.innerHTML = `
        <div class="drag-handle" aria-label="Hold to reorder">
          <svg width="12" height="18" viewBox="0 0 12 18" fill="none">
            <circle cx="3" cy="3"  r="1.5" fill="currentColor"/>
            <circle cx="9" cy="3"  r="1.5" fill="currentColor"/>
            <circle cx="3" cy="9"  r="1.5" fill="currentColor"/>
            <circle cx="9" cy="9"  r="1.5" fill="currentColor"/>
            <circle cx="3" cy="15" r="1.5" fill="currentColor"/>
            <circle cx="9" cy="15" r="1.5" fill="currentColor"/>
          </svg>
        </div>
        <button class="check-btn" aria-label="Toggle status">
          <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
            <path d="M1 4.5l3 3L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="item-body">
          <div class="item-main">
            <span class="todo-text">${esc(todo.text)}</span>
            ${ringHtml}
            ${collapseHtml}
          </div>
          ${taskDueBadge ? `<div class="item-due">${taskDueBadge}</div>` : ''}
          <div class="item-details">${sumHtml}${tagsHtml}${subtasksHtml}</div>
        </div>
        <button class="del-btn" aria-label="Delete task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>`;

      el.querySelector('.drag-handle').addEventListener('pointerdown',
        e => onHandleDown(e, todo.id), { passive: false });
      el.querySelector('.check-btn').addEventListener('click',
        e => { e.stopPropagation(); toggleStatus(todo.id); });
      el.querySelector('.todo-text').addEventListener('click',
        () => openEdit(todo.id));

      const cb = el.querySelector('.collapse-btn');
      if (cb) cb.addEventListener('click', e => { e.stopPropagation(); toggleCollapse(todo.id); });

      el.querySelector('.del-btn').addEventListener('click',
        e => { e.stopPropagation(); removeTodo(todo.id); });

      el.querySelectorAll('.subtask-row').forEach(row => {
        const sid = row.dataset.subtaskId;
        row.querySelector('.subtask-chk').addEventListener('click',
          e => { e.stopPropagation(); toggleSubtask(todo.id, sid); });
        row.querySelector('.st-drag').addEventListener('pointerdown',
          e => { e.stopPropagation(); onSubHandleDown(e, todo.id, sid); }, { passive: false });
      });

      return el;
    }

    // ── Actions ───────────────────────────────────────────────
    function addTodo(text) { const t = load(); t.unshift(createTodo(text)); save(t); render(); }

    function toggleStatus(id) {
      const todos = load(); const t = todos.find(t => t.id === id);
      if (t) { t.status = t.status === 'closed' ? 'open' : 'closed'; save(todos); render(); }
    }

    function removeTodo(id) { save(load().filter(t => t.id !== id)); render(); }

    function updateTodo(id, fields) {
      const todos = load(); const t = todos.find(t => t.id === id);
      if (t) { Object.assign(t, fields); save(todos); render(); }
    }

    function toggleCollapse(id) {
      const todos = load(); const t = todos.find(t => t.id === id);
      if (!t) return;
      t.collapsed = !t.collapsed; save(todos);
      const el = listEl.querySelector(`[data-id="${id}"]`);
      if (!el) return;
      el.classList.toggle('collapsed', t.collapsed);
      const cb = el.querySelector('.collapse-btn');
      if (cb) cb.setAttribute('aria-expanded', String(!t.collapsed));
    }

    function toggleSubtask(todoId, subtaskId) {
      const todos = load(); const todo = todos.find(t => t.id === todoId);
      if (!todo) return;
      const sub = todo.subtasks.find(s => s.id === subtaskId);
      if (!sub) return;
      sub.done = !sub.done; save(todos);
      const row = listEl.querySelector(`[data-subtask-id="${subtaskId}"]`);
      if (row) row.classList.toggle('done', sub.done);
      const doneCount = todo.subtasks.filter(s => s.done).length;
      updateRing(listEl.querySelector(`[data-id="${todoId}"] .prog-ring-wrap`), doneCount, todo.subtasks.length);
    }

    // ── Main item drag ────────────────────────────────────────
    function onHandleDown(e, id) {
      e.preventDefault();
      const sx = e.clientX, sy = e.clientY; let moved = false;
      const onMove = ev => { if (Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy) > 8) { moved=true; cleanup(); } };
      const cleanup = () => { clearTimeout(timer); window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); };
      const onUp = () => cleanup();
      window.addEventListener('pointermove', onMove, { passive: true });
      window.addEventListener('pointerup', onUp, { once: true });
      const timer = setTimeout(() => { cleanup(); if (!moved) beginDrag(id, sy); }, 350);
    }

    function beginDrag(id, startY) {
      if (navigator.vibrate) navigator.vibrate(10);
      const itemEl = listEl.querySelector(`[data-id="${id}"]`);
      if (!itemEl) return;
      const rect = itemEl.getBoundingClientRect();
      const ghost = itemEl.cloneNode(true); ghost.removeAttribute('data-id');
      ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;margin:0;z-index:999;pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,0.55);transform:scale(1.025);border-radius:14px;transition:none`;
      document.body.appendChild(ghost);
      itemEl.classList.add('drag-source');
      drag = { id, itemEl, ghost, startY, ghostTop: rect.top };
      window.addEventListener('pointermove', onDragMove, { passive: false });
      window.addEventListener('pointerup', onDragEnd, { once: true });
    }

    function onDragMove(e) {
      if (!drag) return; e.preventDefault();
      drag.ghost.style.top = (drag.ghostTop + e.clientY - drag.startY) + 'px';
      const mid = drag.ghost.getBoundingClientRect().top + drag.ghost.getBoundingClientRect().height/2;
      for (const item of listEl.querySelectorAll('.todo-item')) {
        if (item === drag.itemEl) continue;
        const r = item.getBoundingClientRect();
        if (mid < r.top + r.height/2) { listEl.insertBefore(drag.itemEl, item); return; }
      }
      listEl.appendChild(drag.itemEl);
    }

    function onDragEnd() {
      if (!drag) return;
      window.removeEventListener('pointermove', onDragMove);
      const order = [...listEl.querySelectorAll('.todo-item')].map(el => el.dataset.id);
      const todos = load();
      save(order.map(id => todos.find(t => t.id === id)).filter(Boolean));
      drag.ghost.remove(); drag.itemEl.classList.remove('drag-source');
      drag = null; render();
    }

    // ── Subtask drag ──────────────────────────────────────────
    function onSubHandleDown(e, todoId, subtaskId) {
      e.preventDefault();
      const sx = e.clientX, sy = e.clientY; let moved = false;
      const onMove = ev => { if (Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy) > 8) { moved=true; cleanup(); } };
      const cleanup = () => { clearTimeout(timer); window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); };
      const onUp = () => cleanup();
      window.addEventListener('pointermove', onMove, { passive: true });
      window.addEventListener('pointerup', onUp, { once: true });
      const timer = setTimeout(() => { cleanup(); if (!moved) beginSubDrag(todoId, subtaskId, sy); }, 300);
    }

    function beginSubDrag(todoId, subtaskId, startY) {
      if (navigator.vibrate) navigator.vibrate(8);
      const itemEl  = listEl.querySelector(`[data-id="${todoId}"]`);
      const subList = itemEl?.querySelector('.subtask-list');
      const rowEl   = subList?.querySelector(`[data-subtask-id="${subtaskId}"]`);
      if (!rowEl || !subList) return;
      const rect  = rowEl.getBoundingClientRect();
      const ghost = rowEl.cloneNode(true);
      ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;margin:0;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.45);transform:scale(1.02);border-radius:6px;background:var(--surface-hi);padding:3px 0;transition:none`;
      document.body.appendChild(ghost);
      rowEl.classList.add('drag-source');
      subtaskDrag = { todoId, subtaskId, rowEl, subList, ghost, startY, ghostTop: rect.top };
      window.addEventListener('pointermove', onSubDragMove, { passive: false });
      window.addEventListener('pointerup', onSubDragEnd, { once: true });
    }

    function onSubDragMove(e) {
      if (!subtaskDrag) return; e.preventDefault();
      subtaskDrag.ghost.style.top = (subtaskDrag.ghostTop + e.clientY - subtaskDrag.startY) + 'px';
      const mid = subtaskDrag.ghost.getBoundingClientRect().top + subtaskDrag.ghost.getBoundingClientRect().height/2;
      for (const row of subtaskDrag.subList.querySelectorAll('.subtask-row')) {
        if (row === subtaskDrag.rowEl) continue;
        const r = row.getBoundingClientRect();
        if (mid < r.top + r.height/2) { subtaskDrag.subList.insertBefore(subtaskDrag.rowEl, row); return; }
      }
      subtaskDrag.subList.appendChild(subtaskDrag.rowEl);
    }

    function onSubDragEnd() {
      if (!subtaskDrag) return;
      window.removeEventListener('pointermove', onSubDragMove);
      const newOrder = [...subtaskDrag.subList.querySelectorAll('.subtask-row')].map(r => r.dataset.subtaskId);
      const todos = load(); const todo = todos.find(t => t.id === subtaskDrag.todoId);
      if (todo) {
        const map = Object.fromEntries(todo.subtasks.map(s => [s.id, s]));
        todo.subtasks = newOrder.map(id => map[id]).filter(Boolean);
        save(todos);
      }
      subtaskDrag.ghost.remove(); subtaskDrag.rowEl.classList.remove('drag-source');
      subtaskDrag = null;
    }

    // ── Edit sheet ────────────────────────────────────────────
    function openEdit(id) {
      const todo = load().find(t => t.id === id);
      if (!todo) return;
      editId = id; sheetTags = [...todo.tags]; sheetStatus = todo.status;
      sheetSubtasks = todo.subtasks.map(s => ({ ...s }));
      editTitleEl.value = todo.text; editDueEl.value = todo.dueDate || '';
      editSumEl.value = todo.summary; subInputEl.value = '';
      syncStatus(); renderChips(); renderSheetSubtasks();
      backdropEl.classList.add('open'); sheetEl.classList.add('open');
      setTimeout(() => editTitleEl.focus(), 300);
    }

    function closeEdit() {
      editId = null;
      backdropEl.classList.remove('open'); sheetEl.classList.remove('open');
    }

    function syncStatus() {
      statusCtrl.querySelectorAll('.seg-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.val === sheetStatus));
    }

    function renderChips() {
      tagChipsEl.innerHTML = sheetTags.map((tag, i) =>
        `<span class="tag-chip">${esc(tag)}<button class="tag-remove" data-i="${i}" aria-label="Remove">×</button></span>`
      ).join('');
      tagChipsEl.querySelectorAll('.tag-remove').forEach(btn =>
        btn.addEventListener('click', () => { sheetTags.splice(Number(btn.dataset.i), 1); renderChips(); })
      );
    }

    function addTag(raw) {
      const w = raw.trim().replace(/\s+/g, '').toLowerCase();
      if (w && !sheetTags.includes(w)) { sheetTags.push(w); renderChips(); }
      tagInputEl.value = '';
    }

    function renderSheetSubtasks() {
      sheetSubsEl.innerHTML = sheetSubtasks.map((s, i) => `
        <div class="sheet-sub-row${s.done ? ' done' : ''}">
          <button class="sheet-sub-chk" data-i="${i}" aria-label="Toggle">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="sheet-sub-body">
            <span class="sheet-sub-text">${esc(s.text)}</span>
            <input type="date" class="sheet-sub-date" data-i="${i}" value="${s.dueDate || ''}" aria-label="Subtask due date" />
          </div>
          <button class="sheet-sub-del" data-i="${i}" aria-label="Delete">×</button>
        </div>`).join('');

      sheetSubsEl.querySelectorAll('.sheet-sub-chk').forEach(btn =>
        btn.addEventListener('click', () => {
          const i = Number(btn.dataset.i); sheetSubtasks[i].done = !sheetSubtasks[i].done; renderSheetSubtasks();
        })
      );
      sheetSubsEl.querySelectorAll('.sheet-sub-del').forEach(btn =>
        btn.addEventListener('click', () => { sheetSubtasks.splice(Number(btn.dataset.i), 1); renderSheetSubtasks(); })
      );
      sheetSubsEl.querySelectorAll('.sheet-sub-date').forEach(input =>
        input.addEventListener('change', () => {
          sheetSubtasks[Number(input.dataset.i)].dueDate = input.value || null;
        })
      );
    }

    function addSheetSubtask() {
      const text = subInputEl.value.trim(); if (!text) return;
      sheetSubtasks.push(createSubtask(text)); subInputEl.value = ''; renderSheetSubtasks();
    }

    document.getElementById('sheet-close').addEventListener('click', closeEdit);
    backdropEl.addEventListener('click', closeEdit);

    statusCtrl.addEventListener('click', e => {
      const btn = e.target.closest('.seg-btn'); if (!btn) return;
      sheetStatus = btn.dataset.val; syncStatus();
    });
    tagInputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === ',') { e.preventDefault(); if (tagInputEl.value.trim()) addTag(tagInputEl.value); }
    });
    tagInputEl.addEventListener('blur', () => { if (tagInputEl.value.trim()) addTag(tagInputEl.value); });
    subInputEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSheetSubtask(); } });
    document.getElementById('sub-add-btn').addEventListener('click', addSheetSubtask);

    document.getElementById('sheet-save').addEventListener('click', () => {
      const title = editTitleEl.value.trim(); if (!title) { editTitleEl.focus(); return; }
      if (tagInputEl.value.trim()) addTag(tagInputEl.value);
      if (subInputEl.value.trim()) addSheetSubtask();
      updateTodo(editId, {
        text: title, status: sheetStatus, dueDate: editDueEl.value || null,
        summary: editSumEl.value.trim(), tags: [...sheetTags], subtasks: [...sheetSubtasks],
      });
      closeEdit();
    });
    document.getElementById('sheet-delete').addEventListener('click', () => { removeTodo(editId); closeEdit(); });

    // ── Input bar ─────────────────────────────────────────────
    inputEl.addEventListener('input', () => { addBtnEl.disabled = !inputEl.value.trim(); });
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && inputEl.value.trim()) submit(); });
    addBtnEl.addEventListener('click', submit);
    function submit() {
      const text = inputEl.value.trim(); if (!text) return;
      addTodo(text); inputEl.value = ''; addBtnEl.disabled = true;
    }

    // ── Boot ──────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
